<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Random Quatation</title>
    <style>
        body {
            font-family: monospace;
        }

        .quotesSection {
            width: 60%;
            height: 100vh;
            background-color: #f1f1f1;
            text-align: center;
            padding: 10px;
            margin: 0 auto;
            border-left: 2px solid;
            border-right: 2px solid;
        }

        .quotes {
            max-width: fit-content;
            padding: 10px 20px;
            border: 2px solid;
            margin: 0 auto;
            border-radius: 3px;
            margin-top: 20px;
            margin: auto;
            background-color: lightcyan;
            transition: all 0.3s ease-in-out;
        }

        .qoutesBtn {
            background-color: brown;
            color: white;
            font-family: monospace;
            padding: 10px 12px;
            margin: 1rem;
            transition: all 0.3s ease-in-out;
        }

        .quotesBtn:hover {
            background-color: orange;
            transform: scale(1.01);
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="quotesSection">
        <h2>Random Quotes</h2>
        <p id="quotes">Click Buyyon to Generate Quotes...</p>
        <button class="quotesBtn" onclick="generateQuotes(event)">Generate Quotes</button>
    </div>

    <script>

        var quotes = [
            "Slow but stady wins the race",

            "The best way to predict the future is to create it",

            "The way to get started is to quit talking and begin doing",

            "The future belongs to those who believe in the beauty of their dreams",

            "Alls well that ends wells"
        ]

        function generateQuotes(event) {
            event.preventDefault();
            var random_index = Math.floor(Math.random() * quotes.length);
            var i = 0;
            var text = ""

            while (i < quotes.length) {
                if (i === random_index) {
                    text += quotes[i] + "<br>";
                    break;
                }
                i++;
            }
            document.getElementById("quotes").innerHTML = text;
            document.getElementById("quotes").classList.add("quotes");
        }
    </script>
</body>

</html>
